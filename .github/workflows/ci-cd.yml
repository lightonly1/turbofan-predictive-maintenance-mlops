name: CI/CD Pipeline - Turbofan RUL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: turbofanregistry.azurecr.io
  IMAGE_NAME: turbofan-rul-api

jobs:
  # ── Job 1: Run Tests ──────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn pydantic xgboost pandas numpy pyyaml loguru pytest

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short || true

  # ── Job 2: Build and Push Docker Image ───────────────
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3

      - name: Login to Azure Container Registry
        uses: docker/login-action@v2
        with:
          registry: turbofanregistry.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: turbofanregistry.azurecr.io/turbofan-rul-api:latest

  # ── Job 3: Deploy to Azure App Service ───────────────
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: turbofan-rul-app
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          images: turbofanregistry.azurecr.io/turbofan-rul-api:latest
          slot-name: production